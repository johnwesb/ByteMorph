<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteMorph | Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { zinc: { 950: '#09090b', 900: '#18181b', 800: '#27272a' } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #09090b; color: #e4e4e7; }
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }
        .bento-card {
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        .bento-card:hover { border-color: rgba(255, 255, 255, 0.15); background: rgba(24, 24, 27, 0.8); }
        .fade-enter-active { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        .progress-bar { transition: width 900ms cubic-bezier(0.4, 0, 0.2, 1); }
        .pdf-canvas-render { border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; }
    </style>
</head>
<body class="antialiased min-h-screen relative selection:bg-zinc-800 selection:text-white flex flex-col">

    <div class="fixed inset-0 z-[-1] bg-grid pointer-events-none"></div>

    <nav class="border-b border-white/5 bg-zinc-950/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div onclick="closeWorkspace()" class="flex items-center gap-3 font-mono font-bold text-lg tracking-tight cursor-pointer hover:text-white transition-colors">
                <i class="fa-solid fa-cubes-stacked text-zinc-400"></i>
                <span>ByteMorph</span>
            </div>
            <div>
                <button id="backBtn" onclick="closeWorkspace()" class="hidden md:flex items-center gap-2 text-zinc-400 hover:text-white bg-white/5 hover:bg-white/10 px-4 py-2 rounded-md font-mono text-sm transition-colors border border-white/5">
                    <i class="fa-solid fa-arrow-left"></i><span>Back to Tools</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 pb-12">
        <div id="dashboard-view" class="fade-enter-active">
            <div class="py-24 text-center">
                <div class="inline-block mb-6 px-3 py-1 rounded-full border border-white/10 bg-white/5 text-xs font-mono text-zinc-400 shadow-sm">
                    > Environment Initialization Complete
                </div>
                <h1 class="text-4xl md:text-5xl font-semibold tracking-tight text-white mb-4 font-mono">Local Workspace</h1>
                <p class="text-zinc-500 text-sm font-sans max-w-xl mx-auto">All processing execution maps occur completely inside sandboxed client memory spaces.</p>
            </div>
            <div class="max-w-6xl mx-auto px-6 pb-16">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="launcher-grid"></div>
            </div>
        </div>

        <div id="workspace-view" class="hidden fade-enter-active">
            <div class="max-w-4xl mx-auto px-6 py-12" id="workspace-container"></div>
        </div>
    </main>

    <footer class="border-t border-white/5 py-8 text-center text-zinc-600 font-mono text-xs">
        <p id="footer-text">ByteMorph Secure Instance Status <span id="lambda-btn" class="hidden cursor-pointer hover:text-orange-500 transition-colors px-1" onclick="triggerEasterEgg()">&lambda;</span></p>
    </footer>

    <script>
        const tools = [
            { id: 'compress', title: 'Compress PDF', desc: 'Reduce file size losslessly', icon: 'fa-compress', api: '/api/compress-pdf', accept: '.pdf', multiple: false, dropText: 'Load Target PDF', dropSubText: 'Drop large document here',
              optionsHtml: `
                <div class="font-mono text-xs space-y-4">
                    <div>
                        <label class="block text-zinc-400 mb-2">Compression Matrix</label>
                        <select name="level" id="compress-level" onchange="updateCompressInfo()" class="w-full p-3 bg-black/50 border border-white/10 rounded-md outline-none text-white">
                            <option value="1">Light (Fastest, Minimal Size Reduction)</option>
                            <option value="2" selected>Moderate (Recommended, Structural Cleanup)</option>
                            <option value="3">Maximum (Aggressive Cleanup, Slower)</option>
                        </select>
                    </div>
                    <div id="compress-info" class="p-4 bg-black/30 rounded-lg border border-white/5 text-zinc-400">
                        <span class="text-blue-400">Moderate Compression:</span> Deeply cleans duplicate fonts, orphaned structural elements, and compresses data streams. <span class="text-white">Zero visual quality loss.</span>
                    </div>
                </div>`
            },
            { id: 'pdf2img', title: 'PDF to Image', desc: 'Convert pages to PNG assets layer archives', icon: 'fa-file-image', api: '/api/pdf-to-image', accept: '.pdf', multiple: false, dropText: 'Load File Payload', dropSubText: 'Drop PDF document' },
            { id: 'merge', title: 'Merge PDFs', desc: 'Consolidate file segments down recursively', icon: 'fa-layer-group', api: '/api/merge-pdfs', accept: '.pdf', multiple: true, dropText: 'Load Target Segments', dropSubText: 'Supports consecutive multi-directory additions', optionsHtml: '<div id="merge-sort-ui" class="hidden w-full mt-4"><div id="merge-thumbnails" class="flex flex-col gap-2 overflow-y-auto max-h-[40vh] p-1 bg-black/20 rounded-lg border border-white/5"></div></div>' },
            { id: 'img2pdf', title: 'Images to PDF', desc: 'Compile graphical file arrays together', icon: 'fa-images', api: '/api/images-to-pdf', accept: 'image/png,image/jpeg,image/jpg', multiple: true, dropText: 'Load Images Grid', dropSubText: 'Supports consecutive file list injections', optionsHtml: '<div id="img2pdf-sort-ui" class="hidden w-full mt-4"><div id="img2pdf-thumbnails" class="grid grid-cols-2 md:grid-cols-3 gap-6 overflow-y-auto max-h-[50vh] p-4 bg-black/30 rounded-lg border border-white/5"></div></div>' },
            { id: 'split', title: 'Split PDF', desc: 'Extract clean designated page range offsets', icon: 'fa-scissors', api: '/api/split-pdf', accept: '.pdf', multiple: false, dropText: 'Load Main Document', dropSubText: 'Drop document here',
              optionsHtml: `
                <div class="p-4 bg-black/20 rounded-lg border border-white/5 mb-4 font-mono text-xs text-zinc-400" id="split-info-tag">> Parsing document parameters...</div>
                <div class="grid grid-cols-2 gap-4 font-mono">
                    <div>
                        <label class="block text-xs text-zinc-400 mb-2">Initial Page Index</label>
                        <input type="number" id="split-start" name="start" min="1" value="1" class="w-full p-3 bg-black/50 border border-white/10 rounded-md focus:border-white/30 outline-none text-white text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-zinc-400 mb-2">Terminal Page Index</label>
                        <input type="number" id="split-end" name="end" min="1" value="1" class="w-full p-3 bg-black/50 border border-white/10 rounded-md focus:border-white/30 outline-none text-white text-sm">
                    </div>
                </div>` 
            },
            { id: 'rotate', title: 'Rotate PDF', desc: 'Modify system viewport rotation orientation parameters', icon: 'fa-rotate-right', api: '/api/rotate-pdf', accept: '.pdf', multiple: false, dropText: 'Load Source Asset', dropSubText: 'Drop file here',
              optionsHtml: `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 font-mono">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-zinc-400 mb-2">Target Selection Constraints</label>
                            <select name="mode" id="rotate-mode" onchange="toggleRotateRange(this.value)" class="w-full p-3 bg-black/50 border border-white/10 rounded-md outline-none text-white text-xs">
                                <option value="all">Apply Globally (All Pages)</option>
                                <option value="odd">Odd Page Sequences Only</option>
                                <option value="even">Even Page Sequences Only</option>
                                <option value="range">Explicit Page Sequences Array</option>
                            </select>
                        </div>
                        <div id="rotate-range-box" class="hidden">
                            <label class="block text-xs text-zinc-400 mb-2">Target Indexes (Example: 1,3,5-7)</label>
                            <input type="text" name="range" class="w-full p-3 bg-black/50 border border-white/10 rounded-md outline-none text-white text-xs" placeholder="Define page arrays...">
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-400 mb-2">Direction Magnitude Matrix</label>
                            <select name="angle" class="w-full p-3 bg-black/50 border border-white/10 rounded-md outline-none text-white text-xs">
                                <option value="90">90° Clockwise</option>
                                <option value="180">180° Absolute</option>
                                <option value="270">90° Counter-Clockwise</option>
                            </select>
                        </div>
                    </div>
                    <div id="rotate-preview-pane" class="flex flex-col items-center justify-center p-4 bg-black/30 rounded-lg border border-white/5 text-zinc-500 text-xs text-center min-h-[150px]">
                        Awaiting configuration maps initialization...
                    </div>
                </div>`
            },
            { id: 'extract', title: 'Extract Text', desc: 'Pull plain text characters safely', icon: 'fa-file-lines', api: '/api/extract-text', accept: '.pdf', multiple: false, dropText: 'Load Structural Data', dropSubText: 'Drop target PDF' },
            { id: 'protect', title: 'Protect PDF', desc: 'Deploy cryptographic password layers', icon: 'fa-lock', api: '/api/protect-pdf', accept: '.pdf', multiple: false, dropText: 'Load Source Payload', dropSubText: 'Drop file here',
              optionsHtml: `
                <div class="font-mono">
                    <label class="block text-xs text-zinc-400 mb-2">Define Configuration Key</label>
                    <input type="password" name="password" placeholder="Key token value..." required class="w-full p-3 bg-black/50 border border-white/10 rounded-md outline-none text-white text-xs">
                </div>`
            },
            { id: 'unlock', title: 'Unlock PDF', desc: 'Strip out active validation parameters', icon: 'fa-unlock', api: '/api/unlock-pdf', accept: '.pdf', multiple: false, dropText: 'Load Locked Payload', dropSubText: 'Drop password-protected document',
              optionsHtml: `
                <div class="font-mono">
                    <label class="block text-xs text-zinc-400 mb-2">Security Key Decryption Values</label>
                    <input type="password" name="password" placeholder="Key token value..." required class="w-full p-3 bg-black/50 border border-white/10 rounded-md outline-none text-white text-xs">
                </div>`
            },
            { id: 'watermark', title: 'Watermark', desc: 'Stamp visible identification tags safely', icon: 'fa-stamp', api: '/api/add-watermark', accept: '.pdf', multiple: false, dropText: 'Load Core File', dropSubText: 'Drop target PDF',
              optionsHtml: `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 font-mono text-xs">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-zinc-400 mb-2">Display Identification Text</label>
                            <input type="text" name="watermark_text" id="wm-text" value="CONFIDENTIAL" oninput="updateWatermarkPreview()" class="w-full p-3 bg-black/50 border border-white/10 rounded-md text-white outline-none">
                        </div>
                        <div>
                            <label class="block text-zinc-400 mb-2">Scale Weight (Font Size)</label>
                            <input type="range" name="size" id="wm-size" min="20" max="100" value="45" oninput="updateWatermarkPreview()" class="w-full accent-white">
                        </div>
                        <div>
                            <label class="block text-zinc-400 mb-2">Opacity Vector Density</label>
                            <input type="range" name="opacity" id="wm-opacity" min="0.1" max="0.9" step="0.05" value="0.25" oninput="updateWatermarkPreview()" class="w-full accent-white">
                        </div>
                    </div>
                    <div class="flex flex-col items-center justify-center p-4 bg-black/30 rounded-lg border border-white/5 relative overflow-hidden min-h-[160px]">
                        <div id="wm-preview-bg" class="absolute inset-0 flex items-center justify-center text-zinc-800/10 uppercase select-none text-[8px] font-bold pointer-events-none p-2 leading-none select-none">Preview Document Matrix Background Mock</div>
                        <div id="wm-preview-text" class="text-red-500 font-bold select-none tracking-widest pointer-events-none transform rotate-[45deg] whitespace-nowrap transition-all z-10">CONFIDENTIAL</div>
                    </div>
                </div>`
            },
            { id: 'pdf2word', title: 'PDF to Word', desc: 'Process conversion profiles into DOCX files', icon: 'fa-file-word', api: '/api/pdf-to-word', accept: '.pdf', multiple: false, dropText: 'Load PDF File', dropSubText: 'Drop target file', optionsHtml: '<div class="bg-blue-500/10 border border-blue-500/20 text-blue-400 p-4 rounded-md font-sans text-sm"><i class="fa-solid fa-circle-info mr-2"></i>Attempting local layout reconstruction.</div>' },
            { id: 'doc2pdf', title: 'Doc to PDF', desc: 'Convert structured layout parameters into PDF', icon: 'fa-file-pdf', api: '/api/doc-to-pdf', accept: '.docx,.txt', multiple: false, dropText: 'Load Document Payload', dropSubText: 'Drop target DOCX or TXT files here', optionsHtml: '<div class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 p-4 rounded-md font-sans text-sm"><i class="fa-solid fa-circle-info mr-2"></i>TXT processed natively. DOCX requires local MS Word.</div>' }
        ];

        let activeFileCounter = 0;
        const activeFileMaps = { 'img2pdf': new Map(), 'merge': new Map() };
        let currentToolId = null;

        tools.forEach(tool => {
            document.getElementById('launcher-grid').innerHTML += `
                <div onclick="openWorkspace('${tool.id}')" class="bento-card rounded-xl p-6 cursor-pointer group flex flex-col justify-between h-40">
                    <div class="flex items-start justify-between">
                        <i class="fa-solid ${tool.icon} text-zinc-400 text-xl group-hover:text-white transition-colors"></i>
                        <i class="fa-solid fa-arrow-right text-xs text-zinc-600 opacity-0 group-hover:opacity-100 transform -translate-x-2 group-hover:translate-x-0 transition-all"></i>
                    </div>
                    <div>
                        <h3 class="text-sm font-semibold text-white mb-1 font-mono">${tool.title}</h3>
                        <p class="text-zinc-500 text-xs font-sans">${tool.desc}</p>
                    </div>
                </div>
            `;
        });

        function toggleRotateRange(val) {
            document.getElementById('rotate-range-box').style.display = (val === 'range') ? 'block' : 'none';
        }

        function updateCompressInfo() {
            const level = document.getElementById('compress-level').value;
            const info = document.getElementById('compress-info');
            if (level === '1') info.innerHTML = '<span class="text-emerald-400">Light Compression:</span> Safely compresses data streams and removes basic unreferenced objects. <span class="text-white">Zero visual quality loss.</span>';
            else if (level === '2') info.innerHTML = '<span class="text-blue-400">Moderate Compression:</span> Deeply cleans duplicate fonts, orphaned structural elements, and compresses data streams. <span class="text-white">Zero visual quality loss.</span>';
            else info.innerHTML = '<span class="text-red-400">Maximum Compression:</span> Aggressively linearizes the document and strips metadata to save space. <span class="text-white">Zero visual quality loss.</span>';
        }

        function updateWatermarkPreview() {
            const txt = document.getElementById('wm-text').value;
            const size = document.getElementById('wm-size').value;
            const opacity = document.getElementById('wm-opacity').value;
            const el = document.getElementById('wm-preview-text');
            if (el) {
                el.innerText = txt;
                el.style.fontSize = (size / 3) + 'px';
                el.style.opacity = opacity;
            }
        }

        function openWorkspace(id) {
            currentToolId = id;
            const tool = tools.find(t => t.id === id);

            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('hidden');

            document.getElementById('workspace-container').innerHTML = `
                <div class="mb-8 font-mono border-b border-white/5 pb-4">
                    <h2 class="text-2xl font-semibold text-white mb-1"><i class="fa-solid ${tool.icon} text-zinc-500 mr-2"></i> /${tool.id}</h2>
                    <p class="text-zinc-500 text-sm font-sans">${tool.desc}</p>
                </div>

                <form id="workspace-form" onsubmit="handleProcess(event, '${tool.id}', '${tool.api}')">
                    <div id="workspace-dropzone" class="mb-8">
                        <div id="dropzone-box" class="border border-dashed border-white/10 bg-zinc-900/30 rounded-xl p-16 text-center transition-all hover:border-white/30 hover:bg-zinc-900/50 cursor-pointer group relative">
                            <input type="file" id="main-file-input" name="${tool.multiple ? 'files' : 'file'}" accept="${tool.accept}" ${tool.multiple ? 'multiple' : ''} onchange="handleFileSelection(this, '${tool.id}')" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                            <div class="font-mono">
                                <span class="inline-flex items-center gap-3 bg-white/5 text-white px-6 py-3 rounded-md text-sm border border-white/10 group-hover:bg-white/10 transition-all pointer-events-none">
                                    <i class="fa-solid fa-upload text-zinc-400"></i> ${tool.dropText}
                                </span>
                                <p class="mt-4 text-zinc-600 text-xs font-sans pointer-events-none">${tool.dropSubText}</p>
                            </div>
                            <p id="dropzone-error" class="text-red-400 mt-4 hidden text-xs font-mono"></p>
                        </div>
                    </div>

                    <div id="workspace-options" class="hidden bento-card rounded-xl p-8">
                        <div id="generic-file-preview" class="hidden mb-8"></div>
                        ${tool.optionsHtml || ''}
                        
                        <div class="mt-8 flex gap-3 font-sans text-sm">
                            <button type="button" onclick="resetWorkspace()" class="flex-1 py-3 bg-white/5 hover:bg-white/10 border border-white/10 text-white rounded-md transition-colors z-30 relative">Clear Workspace</button>
                            ${tool.multiple ? `<button type="button" onclick="triggerIncrementalUpload()" class="flex-1 py-3 bg-zinc-800 hover:bg-zinc-700 border border-white/5 text-zinc-200 rounded-md transition-colors z-30 relative flex items-center justify-center gap-2">Add More Files <i class="fa-solid fa-plus text-xs"></i></button>` : ''}
                            <button type="submit" class="flex-[2] py-3 bg-white text-black font-semibold hover:bg-zinc-200 rounded-md transition-all z-30 relative flex items-center justify-center gap-2">Execute Task <i class="fa-solid fa-play text-xs"></i></button>
                        </div>
                        <p id="workspace-error" class="hidden mt-4 text-red-400 bg-red-500/10 border border-red-500/20 p-4 rounded-md text-xs font-mono"></p>
                    </div>
                </form>

                <div id="workspace-loading" class="hidden bento-card rounded-xl p-12 text-center font-sans">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl text-zinc-400 mb-6"></i>
                    <h4 class="text-lg text-white mb-2 font-mono">Running Local Calculation Matrix...</h4>
                    <p class="text-zinc-500 text-xs mb-8">Writing memory streams to disk architecture</p>
                    <div class="max-w-xs mx-auto h-1 bg-zinc-800 rounded-full overflow-hidden">
                        <div id="progress-bar" class="progress-bar h-full bg-white w-0"></div>
                    </div>
                </div>

                <div id="workspace-success" class="hidden bento-card rounded-xl p-12 text-center font-sans">
                    <div class="w-16 h-16 mx-auto mb-6 bg-white/10 border border-white/20 text-white rounded-full flex items-center justify-center text-2xl"><i class="fa-solid fa-check"></i></div>
                    <h3 class="text-xl text-white mb-2 font-mono">Execution Matrix Finalized</h3>
                    <p class="text-zinc-500 text-xs mb-8">Isolated payload verified locally.</p>
                    <a id="workspace-download" href="#" class="inline-flex items-center gap-3 bg-white text-black font-semibold py-3 px-8 rounded-md hover:bg-zinc-200 transition-colors text-sm mb-6">Save Payload <i class="fa-solid fa-download"></i></a>
                    <br>
                    <button onclick="resetWorkspace()" class="text-zinc-500 hover:text-white text-xs transition-colors underline decoration-zinc-700 underline-offset-4">Run secondary function</button>
                </div>
            `;
            if(id === 'merge') new Sortable(document.getElementById('merge-thumbnails'), { animation: 200 });
            if(id === 'img2pdf') new Sortable(document.getElementById('img2pdf-thumbnails'), { animation: 200 });
        }

        function triggerIncrementalUpload() {
            const inp = document.getElementById('main-file-input');
            if(inp) inp.click();
        }

        function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('!border-white/50', 'bg-zinc-800/50'); }
        function handleDragLeave(e) { e.preventDefault(); e.currentTarget.classList.remove('!border-white/50', 'bg-zinc-800/50'); }
        function handleDrop(e, toolId) {
            e.preventDefault();
            e.currentTarget.classList.remove('!border-white/50', 'bg-zinc-800/50');
            document.getElementById('main-file-input').files = e.dataTransfer.files;
            handleFileSelection(document.getElementById('main-file-input'), toolId);
        }

        function handleFileSelection(inputElement, toolId) {
            const files = inputElement.files;
            if (!files.length) return;

            const errorEl = document.getElementById('dropzone-error');
            if(errorEl) errorEl.classList.add('hidden');

            document.getElementById('workspace-dropzone').classList.add('hidden');
            document.getElementById('workspace-options').classList.remove('hidden');

            if (toolId === 'img2pdf') appendImagesToUI(files);
            else if (toolId === 'merge') appendPDFsToMergeUI(files);
            else generateSingleFileUI(inputElement, toolId);
        }

        async function generateSingleFileUI(inputElement, toolId) {
            const preview = document.getElementById('generic-file-preview');
            const file = inputElement.files[0];
            preview.classList.remove('hidden');

            const isWord = toolId.includes('word') || toolId.includes('doc2pdf');
            const iconClass = isWord ? 'fa-file-word text-blue-400' : 'fa-file-pdf text-red-400';

            preview.innerHTML = `
                <div class="flex items-center gap-4 p-4 bg-black/40 border border-white/5 rounded-lg">
                    <div class="text-2xl"><i class="fa-solid ${iconClass}"></i></div>
                    <div class="flex-1 min-w-0 font-mono">
                        <h4 class="text-sm text-white truncate" title="${file.name}">${file.name}</h4>
                        <p class="text-zinc-500 text-xs mt-1">${(file.size/1024/1024).toFixed(2)} MB</p>
                    </div>
                </div>
            `;

            if (toolId === 'split') {
                try {
                    const url = URL.createObjectURL(file);
                    const pdf = await pdfjsLib.getDocument(url).promise;
                    document.getElementById('split-info-tag').innerText = `> Document Track Analysis: Verified. Length: ${pdf.numPages} Pages total.`;
                    document.getElementById('split-start').max = pdf.numPages;
                    document.getElementById('split-end').max = pdf.numPages;
                    document.getElementById('split-end').value = pdf.numPages;
                    URL.revokeObjectURL(url);
                } catch(e) { document.getElementById('split-info-tag').innerText = `> Error parsing total parameters.`; }
            }

            if (toolId === 'rotate') {
                try {
                    const url = URL.createObjectURL(file);
                    const pdf = await pdfjsLib.getDocument(url).promise;
                    const page = await pdf.getPage(1);
                    const viewport = page.getViewport({ scale: 0.3 });
                    const canvas = document.createElement('canvas');
                    canvas.className = "pdf-canvas-render bg-white";
                    canvas.width = viewport.width; canvas.height = viewport.height;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                    const pane = document.getElementById('rotate-preview-pane');
                    pane.innerHTML = `<p class="mb-2 text-zinc-400">Target Scale (Page 1 Sample View)</p>`;
                    pane.appendChild(canvas);
                    URL.revokeObjectURL(url);
                } catch(e) { document.getElementById('rotate-preview-pane').innerText = "Preview Generation Error Matrix."; }
            }
        }

        function appendImagesToUI(files) {
            const thumbContainer = document.getElementById('img2pdf-thumbnails');
            document.getElementById('img2pdf-sort-ui').classList.remove('hidden');

            Array.from(files).forEach(file => {
                activeFileCounter++;
                const fileId = `img_${Date.now()}_${activeFileCounter}`;
                activeFileMaps['img2pdf'].set(fileId, file);

                const div = document.createElement('div');
                div.className = "bento-card rounded-lg overflow-hidden cursor-grab active:cursor-grabbing border border-white/10 hover:border-white/40 bg-black/60 relative group flex flex-col p-2 h-56 transition-all duration-150";
                div.dataset.id = fileId;

                const imgUrl = URL.createObjectURL(file);
                div.innerHTML = `
                    <div class="flex-1 flex items-center justify-center overflow-hidden bg-zinc-950 rounded border border-white/5 p-1">
                        <img src="${imgUrl}" class="max-w-full max-h-full object-contain opacity-90 group-hover:opacity-100" onload="URL.revokeObjectURL(this.src)">
                    </div>
                    <div class="mt-2 text-center text-[10px] font-mono text-zinc-500 truncate px-1 group-hover:text-zinc-300 transition-colors" title="${file.name}">
                        ${file.name}
                    </div>
                `;
                thumbContainer.appendChild(div);
            });
        }

        function appendPDFsToMergeUI(files) {
            const thumbContainer = document.getElementById('merge-thumbnails');
            document.getElementById('merge-sort-ui').classList.remove('hidden');

            Array.from(files).forEach(file => {
                activeFileCounter++;
                const fileId = `pdf_${Date.now()}_${activeFileCounter}`;
                activeFileMaps['merge'].set(fileId, file);

                const div = document.createElement('div');
                div.className = "flex items-center justify-between bg-black/40 border border-white/5 rounded-lg p-3 cursor-grab hover:border-white/20 transition-all duration-150 group";
                div.dataset.id = fileId;
                
                div.innerHTML = `
                    <div class="flex items-center gap-3 min-w-0 flex-1">
                        <i class="fa-solid fa-grip-vertical text-zinc-700 group-hover:text-zinc-500 transition-colors"></i>
                        <i class="fa-solid fa-file-pdf text-red-500/80"></i>
                        <span class="truncate text-xs font-mono text-zinc-300 group-hover:text-white transition-colors" title="${file.name}">${file.name}</span>
                    </div>
                    <span class="text-[10px] font-mono text-zinc-600 pl-4 flex-shrink-0">${(file.size/1024/1024).toFixed(2)} MB</span>
                `;
                thumbContainer.appendChild(div);
            });
        }

        async function handleProcess(event, toolId, apiEndpoint) {
            event.preventDefault();
            const loading = document.getElementById('workspace-loading');
            const options = document.getElementById('workspace-options');
            const success = document.getElementById('workspace-success');
            const errorEl = document.getElementById('workspace-error');
            const progressBar = document.getElementById('progress-bar');

            options.classList.add('hidden');
            loading.classList.remove('hidden');
            errorEl.classList.add('hidden');

            let progress = 0;
            const int = setInterval(() => {
                progress += Math.random() * 15 + 5;
                if (progress > 90) progress = 90;
                progressBar.style.width = progress + '%';
            }, 200);

            try {
                let formData = new FormData(event.target);

                if (toolId === 'img2pdf' || toolId === 'merge') {
                    formData.delete('files');
                    const id = toolId === 'img2pdf' ? 'img2pdf-thumbnails' : 'merge-thumbnails';
                    for (let el of document.getElementById(id).children) {
                        formData.append('files', activeFileMaps[toolId].get(el.dataset.id));
                    }
                }

                const res = await fetch(apiEndpoint, { method: 'POST', body: formData });
                if (!res.ok) throw new Error(await res.text() || 'Calculated logic returned non-zero validation array.');

                clearInterval(int);
                progressBar.style.width = '100%';

                const blob = await res.blob();
                let filename = `bytemorph_export.pdf`;
                const disp = res.headers.get('Content-Disposition');
                if (disp) {
                    const m = disp.match(/filename[^;=\n]*=([^;\n]*)/);
                    if (m) filename = m[1].replace(/['"]/g, '');
                }

                const dl = document.getElementById('workspace-download');
                const url = window.URL.createObjectURL(blob);
                dl.href = url;
                dl.download = filename;
                
                dl.onclick = () => setTimeout(() => window.URL.revokeObjectURL(url), 1000);

                setTimeout(() => {
                    loading.classList.add('hidden');
                    success.classList.remove('hidden');
                }, 500);

            } catch (err) {
                clearInterval(int);
                loading.classList.add('hidden');
                options.classList.remove('hidden');
                errorEl.innerHTML = `> Run failure encountered: ${err.message}`;
                errorEl.classList.remove('hidden');
            }
        }

        function resetWorkspace() {
            document.getElementById('workspace-form').reset();
            const fileInput = document.getElementById('main-file-input');
            if (fileInput) fileInput.value = '';

            document.getElementById('workspace-dropzone').classList.remove('hidden');
            document.getElementById('workspace-options').classList.add('hidden');
            document.getElementById('workspace-success').classList.add('hidden');
            document.getElementById('workspace-loading').classList.add('hidden');
            document.getElementById('generic-file-preview').classList.add('hidden');
            document.getElementById('progress-bar').style.width = '0%';
            
            activeFileMaps['img2pdf'].clear();
            activeFileMaps['merge'].clear();
            activeFileCounter = 0;
            
            const mergeUi = document.getElementById('merge-sort-ui');
            const imgUi = document.getElementById('img2pdf-sort-ui');
            if (mergeUi) mergeUi.classList.add('hidden');
            if (imgUi) imgUi.classList.add('hidden');
        }

        function closeWorkspace() {
            document.getElementById('workspace-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('backBtn').classList.add('hidden');
            resetWorkspace(); 
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeWorkspace(); });

        let lambdaClicks = 0;
        function triggerEasterEgg() {
            lambdaClicks++;
            if (lambdaClicks === 3) {
                document.getElementById('lambda-btn').onclick = null;
                
                const footerText = document.getElementById('footer-text');
                footerText.innerHTML = '<span class="text-orange-500 font-bold font-mono animate-pulse tracking-wide">Subject: Gordon Freeman. Status: Awaiting Half-Life 3...</span>';
                
                const audioContainer = document.createElement('div');
                audioContainer.innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/LsAXF1Qa2v0?autoplay=1&controls=0&rel=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>';
                document.body.appendChild(audioContainer);

                setTimeout(() => {
                    if (document.body.contains(audioContainer)) {
                        audioContainer.remove();
                    }
                }, 28000); 
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (Math.random() <= 0.333) {
                document.getElementById('lambda-btn').classList.remove('hidden');
            }
        });
    </script>
