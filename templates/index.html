<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteMorph - Secure & Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <style>
        :root { --primary: 16 185 129; }
        .dark { --primary: 52 211 153; }

        .fade-enter { opacity: 0; transform: translateY(15px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 9999px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 9999px; }
        .dark .custom-scrollbar::-webkit-scrollbar-track { background: #1e2937; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #64748b; }

        .pdf-canvas-render {
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            transition: all 0.3s ease;
        }
        .pdf-canvas-render:hover {
            transform: scale(1.06);
            box-shadow: 0 35px 70px -15px rgb(0 0 0 / 0.35);
        }

        .progress-bar { transition: width 900ms cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans min-h-screen flex flex-col transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div onclick="closeWorkspace()" class="flex items-center gap-3 cursor-pointer group">
                <div class="bg-emerald-500 text-white w-9 h-9 rounded-2xl flex items-center justify-center shadow-lg group-hover:rotate-12 transition-transform">
                    <i class="fa-solid fa-microchip"></i>
                </div>
                <span class="text-3xl font-black tracking-tighter">Byte<span class="text-emerald-500">Morph</span></span>
            </div>

            <div class="flex items-center gap-6">
                <button onclick="toggleDarkMode()" id="theme-toggle" class="w-11 h-11 flex items-center justify-center rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i class="fa-solid fa-moon text-xl"></i>
                </button>
                <button id="backBtn" onclick="closeWorkspace()" class="hidden md:flex items-center gap-2 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 px-6 py-3 rounded-2xl font-medium transition-all">
                    <i class="fa-solid fa-arrow-left"></i><span>Back to Tools</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-1 pb-12">
        <div id="dashboard-view" class="fade-enter-active">
            <div class="bg-gradient-to-br from-white via-slate-50 to-white dark:from-slate-900 dark:via-slate-950 py-28 text-center">
                <h1 class="text-6xl md:text-7xl font-black tracking-tighter text-slate-900 dark:text-white mb-6">Your Offline PDF Workspace</h1>
                <p class="text-2xl text-slate-600 dark:text-slate-400">Zero cloud • Zero tracking • Pure privacy</p>
            </div>
            <div class="max-w-7xl mx-auto px-6 py-16">
                <h3 class="uppercase tracking-[3px] text-xs font-bold text-slate-400 dark:text-slate-500 mb-10 text-center">AVAILABLE TOOLS</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="launcher-grid"></div>
            </div>
        </div>

        <div id="workspace-view" class="hidden">
            <div class="bg-gradient-to-r from-slate-900 to-slate-800 text-white py-16 px-6 border-b-4 border-emerald-500" id="workspace-hero"></div>
            <div class="max-w-7xl mx-auto px-6 py-10" id="workspace-container"></div>
        </div>
    </main>

    <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 py-10 text-center text-slate-400 dark:text-slate-500">
        <p>© 2026 ByteMorph • Secure Local Environment</p>
    </footer>

    <script>
        const tools = [
            { id: 'pdf2img', title: 'PDF to Image', desc: 'Convert pages to JPG/PNG', icon: 'fa-file-image text-emerald-500', api: '/api/pdf-to-image', accept: '.pdf', multiple: false, dropText: 'Upload PDF file', dropSubText: 'or drag & drop your PDF here', optionsHtml: '' },
            { id: 'merge', title: 'Merge PDFs', desc: 'Combine documents in order', icon: 'fa-layer-group text-purple-500', api: '/api/merge-pdfs', accept: '.pdf', multiple: true, dropText: 'Upload PDF files', dropSubText: 'or drag & drop multiple PDFs here', optionsHtml: '<div id="merge-sort-ui" class="hidden flex-grow flex flex-col w-full"><div id="merge-thumbnails" class="grid grid-cols-1 md:grid-cols-2 gap-4 overflow-y-auto custom-scrollbar flex-grow p-2" style="max-height: 60vh;"></div></div>' },
            { id: 'img2pdf', title: 'Images to PDF', desc: 'Turn photos into a PDF', icon: 'fa-images text-blue-500', api: '/api/images-to-pdf', accept: 'image/png,image/jpeg,image/jpg', multiple: true, dropText: 'Upload Images', dropSubText: 'or drag & drop JPG/PNG files here', optionsHtml: '<div id="img2pdf-sort-ui" class="hidden flex-grow flex flex-col w-full"><div id="img2pdf-thumbnails" class="flex flex-wrap gap-6 overflow-y-auto custom-scrollbar flex-grow content-start justify-center p-4 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700" style="max-height: 60vh;"></div></div>' },
            { id: 'split', title: 'Split PDF', desc: 'Extract specific pages', icon: 'fa-scissors text-red-500', api: '/api/split-pdf', accept: '.pdf', multiple: false, dropText: 'Upload PDF file', dropSubText: 'or drag & drop your PDF here',
              optionsHtml: `
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Start Page</label>
                        <input type="number" name="start" min="1" value="1" class="w-full p-4 border border-slate-300 dark:border-slate-600 rounded-2xl focus:border-emerald-500 outline-none text-lg bg-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">End Page</label>
                        <input type="number" name="end" min="1" value="1" class="w-full p-4 border border-slate-300 dark:border-slate-600 rounded-2xl focus:border-emerald-500 outline-none text-lg bg-transparent">
                    </div>
                </div>` 
            },
            { id: 'rotate', title: 'Rotate PDF', desc: 'Fix page orientation', icon: 'fa-rotate-right text-indigo-500', api: '/api/rotate-pdf', accept: '.pdf', multiple: false, dropText: 'Upload PDF file', dropSubText: 'or drag & drop your PDF here',
              optionsHtml: `
                <div>
                    <label class="block text-sm font-medium mb-2">Rotation Angle</label>
                    <select name="angle" class="w-full p-4 border border-slate-300 dark:border-slate-600 rounded-2xl focus:border-emerald-500 outline-none text-lg bg-transparent dark:bg-slate-800">
                        <option value="90">90° Clockwise</option>
                        <option value="180">180°</option>
                        <option value="270">90° Counter-clockwise</option>
                    </select>
                </div>`
            },
            { id: 'extract', title: 'Extract Text', desc: 'Pull raw text out of PDFs', icon: 'fa-file-lines text-orange-500', api: '/api/extract-text', accept: '.pdf', multiple: false, dropText: 'Upload PDF file', dropSubText: 'or drag & drop your PDF here', optionsHtml: '' },
            { id: 'protect', title: 'Protect PDF', desc: 'Add AES encryption', icon: 'fa-lock text-slate-600', api: '/api/protect-pdf', accept: '.pdf', multiple: false, dropText: 'Upload PDF file', dropSubText: 'or drag & drop your PDF here',
              optionsHtml: `
                <div>
                    <label class="block text-sm font-medium mb-2">Set Password</label>
                    <input type="password" name="password" placeholder="Enter strong password" required
                           class="w-full p-4 border border-slate-300 dark:border-slate-600 rounded-2xl focus:border-emerald-500 outline-none text-lg bg-transparent">
                </div>`
            },
            { id: 'unlock', title: 'Unlock PDF', desc: 'Remove password', icon: 'fa-unlock text-emerald-600', api: '/api/unlock-pdf', accept: '.pdf', multiple: false, dropText: 'Upload Protected PDF', dropSubText: 'or drag & drop your locked PDF here',
              optionsHtml: `
                <div>
                    <label class="block text-sm font-medium mb-2">Current Password</label>
                    <input type="password" name="password" placeholder="••••••••" required
                           class="w-full p-4 border border-slate-300 dark:border-slate-600 rounded-2xl focus:border-emerald-500 outline-none text-lg bg-transparent">
                </div>`
            },
            { id: 'watermark', title: 'Add Watermark', desc: 'Stamp text on pages', icon: 'fa-stamp text-sky-500', api: '/api/add-watermark', accept: '.pdf', multiple: false, dropText: 'Upload PDF file', dropSubText: 'or drag & drop your PDF here',
              optionsHtml: `
                <div>
                    <label class="block text-sm font-medium mb-2">Watermark Text</label>
                    <input type="text" name="watermark_text" value="CONFIDENTIAL" 
                           class="w-full p-4 border border-slate-300 dark:border-slate-600 rounded-2xl focus:border-emerald-500 outline-none text-lg bg-transparent">
                </div>`
            },
            { id: 'pdf2word', title: 'PDF to Word', desc: 'Convert PDF to DOCX', icon: 'fa-file-word text-blue-600', api: '/api/pdf-to-word', accept: '.pdf', multiple: false, dropText: 'Upload PDF file', dropSubText: 'or drag & drop your PDF here', optionsHtml: '' },
            { id: 'word2pdf', title: 'Word to PDF', desc: 'Convert DOCX to PDF', icon: 'fa-file-pdf text-red-600', api: '/api/word-to-pdf', accept: '.docx', multiple: false, dropText: 'Upload Word Document', dropSubText: 'or drag & drop your DOCX file here', optionsHtml: '' }
        ];

        const activeFileMaps = { 'img2pdf': new Map(), 'merge': new Map() };
        let currentToolId = null;
        let isDarkMode = localStorage.getItem('darkMode') === 'true';

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.documentElement.classList.toggle('dark', isDarkMode);
            localStorage.setItem('darkMode', isDarkMode);
            document.getElementById('theme-toggle').innerHTML = isDarkMode ? 
                '<i class="fa-solid fa-sun text-xl"></i>' : '<i class="fa-solid fa-moon text-xl"></i>';
        }

        if (isDarkMode) document.documentElement.classList.add('dark');

        // Launcher
        tools.forEach(tool => {
            document.getElementById('launcher-grid').innerHTML += `
                <div onclick="openWorkspace('${tool.id}')" class="group bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-8 hover:border-emerald-500 transition-all hover:shadow-2xl hover:-translate-y-1 cursor-pointer">
                    <div class="text-6xl mb-6 text-center transition-transform group-hover:scale-110"><i class="fa-solid ${tool.icon}"></i></div>
                    <h3 class="text-2xl font-bold mb-2">${tool.title}</h3>
                    <p class="text-slate-500 dark:text-slate-400">${tool.desc}</p>
                </div>
            `;
        });

        function openWorkspace(id) {
            currentToolId = id;
            const tool = tools.find(t => t.id === id);

            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.remove('hidden');
            document.getElementById('backBtn').classList.remove('hidden');

            document.getElementById('workspace-hero').innerHTML = `
                <div class="max-w-4xl mx-auto text-center">
                    <i class="fa-solid ${tool.icon.replace(/text-.*/, '')} text-7xl mb-6 text-white opacity-90"></i>
                    <h2 class="text-5xl font-black mb-4">${tool.title}</h2>
                    <p class="text-emerald-300 text-2xl">${tool.desc}</p>
                </div>
            `;

            document.getElementById('workspace-container').innerHTML = `
                <form id="workspace-form" class="max-w-6xl mx-auto" onsubmit="handleProcess(event, '${tool.id}', '${tool.api}')">
                    <div id="workspace-dropzone" class="mb-12">
                        <div id="dropzone-box" class="border-4 border-dashed border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 rounded-3xl p-24 text-center transition-all hover:border-emerald-500 cursor-pointer group"
                             ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, '${tool.id}')">
                            <input type="file" id="main-file-input" name="${tool.multiple ? 'files' : 'file'}" accept="${tool.accept}" ${tool.multiple ? 'multiple' : ''} onchange="handleFileSelection(this, '${tool.id}')" class="hidden">
                            <div>
                                <span class="inline-flex items-center gap-5 bg-emerald-600 text-white px-16 py-8 rounded-3xl text-2xl font-bold shadow-2xl group-hover:bg-emerald-700 transition-all pointer-events-none">
                                    <i class="fa-solid fa-upload"></i> ${tool.dropText}
                                </span>
                                <p class="mt-10 text-slate-500 dark:text-slate-400 text-xl pointer-events-none">${tool.dropSubText}</p>
                            </div>
                            <p id="dropzone-error" class="text-red-500 mt-8 hidden text-lg"></p>
                        </div>
                    </div>

                    <div id="workspace-options" class="hidden bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-100 dark:border-slate-700 p-10">
                        <h3 class="text-3xl font-bold mb-8 flex items-center gap-4"><i class="fa-solid fa-sliders text-emerald-500"></i> Preview & Configure</h3>
                        
                        <div id="generic-file-preview" class="hidden mb-12"></div>
                        ${tool.optionsHtml || ''}
                        
                        <div class="mt-12 flex gap-4">
                            <button type="button" onclick="resetWorkspace()" class="flex-1 py-7 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-3xl font-bold text-lg transition-colors">Change File</button>
                            <button type="submit" class="flex-1 py-7 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl font-bold text-2xl shadow-xl transition-transform hover:-translate-y-1">Process Securely <i class="fa-solid fa-arrow-right ml-3"></i></button>
                        </div>
                        <p id="workspace-error" class="hidden mt-6 text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-950 p-6 rounded-2xl text-center"></p>
                    </div>
                </form>

                <div id="workspace-loading" class="hidden bg-white dark:bg-slate-900 rounded-3xl shadow-2xl p-16 text-center max-w-2xl mx-auto">
                    <i class="fa-solid fa-circle-notch fa-spin text-8xl text-emerald-500 mb-8"></i>
                    <h4 class="text-4xl font-bold mb-3">Processing securely...</h4>
                    <p class="text-slate-500 dark:text-slate-400 mb-10">Everything stays on your device</p>
                    <div class="max-w-md mx-auto h-3 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
                        <div id="progress-bar" class="progress-bar h-full bg-gradient-to-r from-emerald-400 to-teal-500 w-0"></div>
                    </div>
                </div>

                <div id="workspace-success" class="hidden bg-white dark:bg-slate-900 rounded-3xl shadow-2xl p-16 text-center max-w-2xl mx-auto">
                    <div class="w-32 h-32 mx-auto mb-8 bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 rounded-full flex items-center justify-center text-7xl">✓</div>
                    <h3 class="text-5xl font-bold mb-4">Task Completed!</h3>
                    <p class="text-2xl text-slate-500 dark:text-slate-400 mb-12">Your file is ready</p>
                    <a id="workspace-download" href="#" class="inline-flex items-center gap-4 bg-emerald-600 hover:bg-emerald-700 text-white text-2xl font-bold py-7 px-20 rounded-3xl shadow-2xl transition-transform hover:-translate-y-1">Download Result <i class="fa-solid fa-download"></i></a>
                    <button onclick="resetWorkspace()" class="mt-12 text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-3 mx-auto text-lg"><i class="fa-solid fa-rotate"></i> Process Another File</button>
                </div>
            `;
        }

        // Drag & Drop
        function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('!border-emerald-500', 'bg-emerald-50', 'dark:bg-emerald-950/20'); }
        function handleDragLeave(e) { e.preventDefault(); e.currentTarget.classList.remove('!border-emerald-500', 'bg-emerald-50', 'dark:bg-emerald-950/20'); }
        function handleDrop(e, toolId) {
            e.preventDefault();
            e.currentTarget.classList.remove('!border-emerald-500', 'bg-emerald-50', 'dark:bg-emerald-950/20');
            document.getElementById('main-file-input').files = e.dataTransfer.files;
            handleFileSelection(document.getElementById('main-file-input'), toolId);
        }

        function validateFiles(files, toolId) {
            const tool = tools.find(t => t.id === toolId);
            if (!tool?.accept) return true;
            const accepted = tool.accept.split(',').map(t => t.trim().toLowerCase());
            return Array.from(files).every(file => {
                const name = file.name.toLowerCase();
                const type = file.type.toLowerCase();
                return accepted.some(acc => name.endsWith(acc) || type.startsWith(acc.split('/')[0]) || type === acc);
            });
        }

        function handleFileSelection(inputElement, toolId) {
            const files = inputElement.files;
            if (!files.length) return;

            const errorEl = document.getElementById('dropzone-error');
            errorEl.classList.add('hidden');

            if (!validateFiles(files, toolId)) {
                errorEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1"></i> Invalid file type uploaded. Please upload ${tools.find(t=>t.id===toolId).accept}`;
                errorEl.classList.remove('hidden');
                inputElement.value = '';
                return;
            }

            document.getElementById('workspace-dropzone').classList.add('hidden');
            document.getElementById('workspace-loading').classList.remove('hidden');

            setTimeout(() => {
                if (toolId === 'img2pdf') generateImageUI(inputElement);
                else if (toolId === 'merge') generateMergeUI(inputElement);
                else generateSingleFileUI(inputElement, toolId);

                document.getElementById('workspace-loading').classList.add('hidden');
                document.getElementById('workspace-options').classList.remove('hidden');
            }, 600);
        }

        async function renderPdfPageToCanvas(file, pageNum = 1, targetWidth = 200) {
            const fileUrl = URL.createObjectURL(file);
            const pdf = await pdfjsLib.getDocument(fileUrl).promise;
            const page = await pdf.getPage(pageNum);
            
            const viewport = page.getViewport({ scale: 1.0 });
            const scale = targetWidth / viewport.width;
            const scaledViewport = page.getViewport({ scale: scale });
            
            const canvas = document.createElement('canvas');
            canvas.className = "pdf-canvas-render bg-white";
            canvas.height = scaledViewport.height;
            canvas.width = scaledViewport.width;
            
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: scaledViewport }).promise;
            URL.revokeObjectURL(fileUrl);
            return { canvas: canvas, totalPages: pdf.numPages };
        }

        async function generateSingleFileUI(inputElement, toolId) {
            const preview = document.getElementById('generic-file-preview');
            const file = inputElement.files[0];
            preview.classList.remove('hidden');

            const isWord = toolId.includes('word');
            const iconClass = isWord ? 'fa-file-word text-blue-500' : 'fa-file-pdf text-red-500';

            preview.innerHTML = `
                <div class="flex items-center gap-6 p-6 bg-slate-50 dark:bg-slate-800 rounded-3xl mb-8 border border-slate-200 dark:border-slate-700">
                    <div class="text-6xl"><i class="fa-solid ${iconClass}"></i></div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-semibold text-2xl truncate">${file.name}</h4>
                        <p class="text-slate-500 dark:text-slate-400 mt-1">${(file.size/1024/1024).toFixed(2)} MB</p>
                    </div>
                    <div class="text-emerald-500 text-4xl"><i class="fa-solid fa-circle-check"></i></div>
                </div>
            `;

            if (isWord) return;

            const grid = document.createElement('div');
            grid.className = "flex gap-10 overflow-x-auto custom-scrollbar pb-8 pt-4 snap-x snap-mandatory";
            grid.innerHTML = '<div class="text-center w-full text-slate-400 py-6"><i class="fa-solid fa-circle-notch fa-spin text-3xl text-emerald-500 mb-2"></i><br>Rendering pages...</div>';
            preview.appendChild(grid);

            try {
                const pdf = await pdfjsLib.getDocument(URL.createObjectURL(file)).promise;
                grid.innerHTML = '';
                const max = Math.min(pdf.numPages, 10);
                for (let i = 1; i <= max; i++) {
                    const page = await pdf.getPage(i);
                    const scale = 200 / page.getViewport({scale:1}).width;
                    const viewport = page.getViewport({scale});
                    const canvas = document.createElement('canvas');
                    canvas.className = "pdf-canvas-render flex-shrink-0 snap-center bg-white";
                    canvas.width = viewport.width; canvas.height = viewport.height;
                    await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;

                    const wrap = document.createElement('div');
                    wrap.className = "flex-shrink-0 flex flex-col items-center gap-3 group";
                    wrap.innerHTML = `${canvas.outerHTML}<span class="text-sm font-bold text-slate-500 dark:text-slate-400">Page ${i}</span>`;
                    grid.appendChild(wrap);
                }
            } catch(e) {
                grid.innerHTML = `<p class="text-amber-600"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Preview unavailable for this specific PDF type.</p>`;
            }
        }

        function generateImageUI(inputElement) { 
            const thumbContainer = document.getElementById('img2pdf-thumbnails');
            thumbContainer.innerHTML = '';
            activeFileMaps['img2pdf'].clear();
            document.getElementById('img2pdf-sort-ui').classList.remove('hidden');

            Array.from(inputElement.files).forEach((file, index) => {
                const fileId = `img_${Date.now()}_${index}`;
                activeFileMaps['img2pdf'].set(fileId, file);

                const div = document.createElement('div');
                div.className = "w-64 aspect-[3/4] rounded-2xl overflow-hidden cursor-grab active:cursor-grabbing border-2 border-slate-200 dark:border-slate-600 hover:border-emerald-500 relative group bg-white dark:bg-slate-900 shadow-sm hover:shadow-xl transition-all flex flex-col p-3";
                div.dataset.id = fileId;

                const imgUrl = URL.createObjectURL(file);
                div.innerHTML = `
                    <div class="flex-grow flex items-center justify-center overflow-hidden mb-10 bg-slate-100 dark:bg-slate-800 rounded-xl p-2">
                        <img src="${imgUrl}" class="max-w-full max-h-full object-contain pointer-events-none" onload="URL.revokeObjectURL(this.src)">
                    </div>
                    <div class="absolute bottom-0 left-0 right-0 bg-slate-800 dark:bg-slate-950 text-white text-sm font-medium truncate px-4 py-3 text-center pointer-events-none">
                        ${file.name}
                    </div>
                `;
                thumbContainer.appendChild(div);
            });
            new Sortable(thumbContainer, { animation: 200, ghostClass: 'sortable-ghost-img' });
        }

        function generateMergeUI(inputElement) { 
            const thumbContainer = document.getElementById('merge-thumbnails');
            thumbContainer.innerHTML = '';
            activeFileMaps['merge'].clear();
            document.getElementById('merge-sort-ui').classList.remove('hidden');

            Array.from(inputElement.files).forEach(async (file, index) => {
                const fileId = `pdf_${Date.now()}_${index}`;
                activeFileMaps['merge'].set(fileId, file);

                const div = document.createElement('div');
                div.className = "flex items-stretch bg-white dark:bg-slate-800 rounded-2xl border-2 border-slate-200 dark:border-slate-700 cursor-grab active:cursor-grabbing hover:border-emerald-500 shadow-sm hover:shadow-md transition-all group overflow-hidden h-36";
                div.dataset.id = fileId;
                
                div.innerHTML = `
                    <div class="pdf-cover-container w-32 bg-slate-100 dark:bg-slate-900 flex-shrink-0 flex items-center justify-center border-r border-slate-200 dark:border-slate-700 relative overflow-hidden p-3">
                        <i class="fa-solid fa-circle-notch fa-spin text-slate-300 text-3xl"></i>
                    </div>
                    <div class="flex-grow flex flex-col justify-center px-5 py-2 overflow-hidden">
                        <div class="truncate text-lg font-bold text-slate-700 dark:text-slate-200 mb-1">${file.name}</div>
                        <div class="text-sm font-semibold text-slate-400 page-count-tag">Loading preview...</div>
                    </div>
                    <div class="text-slate-300 dark:text-slate-600 bg-slate-50 dark:bg-slate-900 group-hover:bg-emerald-50 dark:group-hover:bg-emerald-900/20 group-hover:text-emerald-500 transition-colors w-16 flex items-center justify-center flex-shrink-0 border-l border-slate-100 dark:border-slate-700">
                        <i class="fa-solid fa-grip-vertical text-2xl"></i>
                    </div>
                `;
                thumbContainer.appendChild(div);

                try {
                    const result = await renderPdfPageToCanvas(file, 1, 120);
                    const cover = div.querySelector('.pdf-cover-container');
                    cover.innerHTML = '';
                    cover.appendChild(result.canvas);
                    div.querySelector('.page-count-tag').innerHTML = `<i class="fa-regular fa-file-lines mr-1"></i> ${result.totalPages} Pages`;
                } catch(e) {
                    div.querySelector('.pdf-cover-container').innerHTML = '<i class="fa-solid fa-file-pdf text-red-400 text-5xl"></i>';
                    div.querySelector('.page-count-tag').innerHTML = "Preview Unavailable";
                }
            });
            new Sortable(thumbContainer, { animation: 200, ghostClass: 'sortable-ghost-doc' });
        }

        async function handleProcess(event, toolId, apiEndpoint) {
            event.preventDefault();
            const loading = document.getElementById('workspace-loading');
            const options = document.getElementById('workspace-options');
            const success = document.getElementById('workspace-success');
            const errorEl = document.getElementById('workspace-error');
            const progressBar = document.getElementById('progress-bar');

            options.classList.add('hidden');
            loading.classList.remove('hidden');
            errorEl.classList.add('hidden');

            let progress = 0;
            const int = setInterval(() => {
                progress += Math.random()*18 + 8;
                if (progress > 95) progress = 95;
                progressBar.style.width = progress + '%';
            }, 180);

            try {
                let formData = new FormData(event.target);

                if (toolId === 'img2pdf' || toolId === 'merge') {
                    formData.delete('files');
                    const id = toolId === 'img2pdf' ? 'img2pdf-thumbnails' : 'merge-thumbnails';
                    for (let el of document.getElementById(id).children) {
                        formData.append('files', activeFileMaps[toolId].get(el.dataset.id));
                    }
                }

                const res = await fetch(apiEndpoint, { method: 'POST', body: formData });
                if (!res.ok) throw new Error(await res.text() || 'Processing failed');

                clearInterval(int);
                progressBar.style.width = '100%';

                const blob = await res.blob();
                let filename = `bytemorph_export.pdf`;
                const disp = res.headers.get('Content-Disposition');
                if (disp) {
                    const m = disp.match(/filename[^;=\n]*=([^;\n]*)/);
                    if (m) filename = m[1].replace(/['"]/g, '');
                }

                const dl = document.getElementById('workspace-download');
                dl.href = URL.createObjectURL(blob);
                dl.download = filename;

                setTimeout(() => {
                    loading.classList.add('hidden');
                    success.classList.remove('hidden');
                }, 600);

            } catch (err) {
                clearInterval(int);
                loading.classList.add('hidden');
                options.classList.remove('hidden');
                errorEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> ${err.message}`;
                errorEl.classList.remove('hidden');
            }
        }

        function resetWorkspace() {
            document.getElementById('workspace-form').reset();
            document.getElementById('workspace-dropzone').classList.remove('hidden');
            document.getElementById('workspace-options').classList.add('hidden');
            document.getElementById('workspace-success').classList.add('hidden');
            document.getElementById('workspace-loading').classList.add('hidden');
            document.getElementById('generic-file-preview').classList.add('hidden');
            document.getElementById('progress-bar').style.width = '0%';
            activeFileMaps['img2pdf'].clear();
            activeFileMaps['merge'].clear();
            
            // Re-hide sort UI containers
            const mergeUi = document.getElementById('merge-sort-ui');
            const imgUi = document.getElementById('img2pdf-sort-ui');
            if (mergeUi) mergeUi.classList.add('hidden');
            if (imgUi) imgUi.classList.add('hidden');
        }

        function closeWorkspace() {
            document.getElementById('workspace-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('backBtn').classList.add('hidden');
            resetWorkspace(); // Cleans up file maps and UI states when closing
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeWorkspace(); });
    </script>
</body>
</html>
